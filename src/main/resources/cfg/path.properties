# Path configuration shared by local macOS and Docker.
# Local default root: ~/Downloads/com4energy  (resuelto via ${user.home})
# Docker override: C4E_STORAGE_ROOT=/usr/local/tomcat/resources
storage.root=${C4E_STORAGE_ROOT:${user.home}/Downloads/com4energy}

# Peajes
peajes=${storage.root}/Peajes/
peajes.procesados=${peajes}Procesados/
peajes.remesa=${peajes.procesados}RemesaPago/
peajes.archivarfactura=${peajes.procesados}ArchivarFactura/
peajes.ftp=${peajes}ftp/

# SQL
sql.backup=${peajes}Backups/
sql.restauraciones=${sql.backup}restauraciones/


